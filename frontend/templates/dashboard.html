<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Maintenance — 2021 Mazda 3</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left { display: flex; align-items: baseline; gap: 12px; }
    .header-title { font-size: 1.2rem; font-weight: 700; letter-spacing: .3px; }
    .header-sub {
      font-size: .85rem;
      color: #a0aec0;
      font-weight: 400;
    }

    /* ── Toast ───────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      min-width: 260px;
      max-width: 380px;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #toast.success { background: #22c55e; color: #fff; }
    #toast.error   { background: #ef4444; color: #fff; }

    /* ── Spinner overlay ─────────────────────────────────────── */
    #spinner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.55);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    #spinner-overlay.active { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main layout ─────────────────────────────────────────── */
    main {
      max-width: 960px;
      margin: 28px auto;
      padding: 0 16px 60px;
    }

    /* ── Card base ───────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,.08);
      padding: 20px 24px;
    }

    /* ── Mileage card ────────────────────────────────────────── */
    #mileage-section {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .mileage-card { flex: 1 1 320px; }

    .mileage-stats { display: flex; gap: 32px; flex-wrap: wrap; margin-bottom: 16px; }

    .stat-block { display: flex; flex-direction: column; }
    .stat-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .6px; color: #64748b; font-weight: 600; margin-bottom: 2px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: #1a1a2e; line-height: 1.1; }
    .stat-value.large { font-size: 2.6rem; }
    .stat-value span.unit { font-size: 1rem; font-weight: 500; color: #94a3b8; margin-left: 3px; }

    .stat-secondary { font-size: .95rem; color: #334155; }

    /* inline update form */
    #odometer-form-wrapper { margin-top: 14px; }
    #odometer-form {
      display: none;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      margin-top: 10px;
      gap: 10px;
      flex-direction: column;
    }
    #odometer-form.open { display: flex; }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1 1 140px; }
    .form-group label { font-size: .78rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .5px; }

    input[type="number"],
    input[type="date"],
    input[type="text"],
    textarea {
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: .92rem;
      font-family: inherit;
      color: #1a1a2e;
      background: #fff;
      width: 100%;
      transition: border-color .15s;
    }
    input:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }

    .input-with-unit { position: relative; }
    .input-with-unit input { padding-right: 36px; }
    .input-unit {
      position: absolute;
      right: 10px; top: 50%; transform: translateY(-50%);
      font-size: .78rem; color: #94a3b8; font-weight: 600; pointer-events: none;
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 7px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background .15s, box-shadow .15s, opacity .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .btn-primary   { background: #3b82f6; color: #fff; }
    .btn-primary:hover:not(:disabled)   { background: #2563eb; }

    .btn-success   { background: #22c55e; color: #fff; }
    .btn-success:hover:not(:disabled)   { background: #16a34a; }

    .btn-amber     { background: #f59e0b; color: #fff; }
    .btn-amber:hover:not(:disabled)     { background: #d97706; }

    .btn-ghost {
      background: transparent;
      color: #475569;
      border: 1px solid #cbd5e1;
    }
    .btn-ghost:hover:not(:disabled) { background: #f1f5f9; }

    .btn-sm { padding: 6px 12px; font-size: .82rem; }

    /* ── Section headers ─────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 32px 0 14px;
    }
    .section-header h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a1a2e;
    }
    .section-count {
      background: #e2e8f0;
      color: #475569;
      font-size: .75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
    }

    /* ── Task cards ──────────────────────────────────────────── */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      border-left: 4px solid transparent;
      padding: 16px 18px;
      transition: box-shadow .15s;
    }
    .task-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.11); }

    .task-card.status-overdue,
    .task-card.status-never_done { background: #fff5f5; border-left-color: #ef4444; }
    .task-card.status-due_soon   { background: #fffbf0; border-left-color: #f59e0b; }
    .task-card.status-ok         { background: #f0fdf4; border-left-color: #22c55e; }

    .task-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .task-title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .task-name { font-size: 1rem; font-weight: 700; color: #1a1a2e; }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 99px;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      background: #e2e8f0;
      color: #475569;
    }
    .badge-engine    { background: #dbeafe; color: #1d4ed8; }
    .badge-oil       { background: #dbeafe; color: #1d4ed8; }
    .badge-tyres     { background: #fce7f3; color: #be185d; }
    .badge-tyre      { background: #fce7f3; color: #be185d; }
    .badge-brakes    { background: #fee2e2; color: #b91c1c; }
    .badge-brake     { background: #fee2e2; color: #b91c1c; }
    .badge-fluids    { background: #d1fae5; color: #065f46; }
    .badge-fluid     { background: #d1fae5; color: #065f46; }
    .badge-cooling   { background: #cffafe; color: #0e7490; }
    .badge-filters   { background: #ede9fe; color: #6d28d9; }
    .badge-filter    { background: #ede9fe; color: #6d28d9; }
    .badge-lighting  { background: #fef9c3; color: #854d0e; }
    .badge-electrical{ background: #fef9c3; color: #854d0e; }
    .badge-suspension{ background: #ffedd5; color: #9a3412; }
    .badge-belts     { background: #e0f2fe; color: #0369a1; }
    .badge-belt      { background: #e0f2fe; color: #0369a1; }
    .badge-battery   { background: #fefce8; color: #713f12; }
    .badge-ac        { background: #f0fdf4; color: #166534; }
    .badge-exhaust   { background: #f5f5f4; color: #44403c; }
    .badge-wipers    { background: #eff6ff; color: #1e40af; }
    .badge-wiper     { background: #eff6ff; color: #1e40af; }
    .badge-inspection{ background: #fdf4ff; color: #7e22ce; }

    .task-meta {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .meta-item { display: flex; flex-direction: column; }
    .meta-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .5px; color: #94a3b8; font-weight: 600; }
    .meta-value { font-size: .88rem; color: #334155; font-weight: 500; }
    .meta-value.highlight-red    { color: #dc2626; font-weight: 700; }
    .meta-value.highlight-amber  { color: #d97706; font-weight: 700; }
    .meta-value.highlight-green  { color: #16a34a; font-weight: 700; }

    .task-notes { margin-top: 8px; font-size: .82rem; font-style: italic; color: #64748b; }

    /* inline mark-done form */
    .mark-done-form-wrapper { margin-top: 12px; }
    .mark-done-form {
      display: none;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 14px;
      flex-direction: column;
      gap: 10px;
    }
    .mark-done-form.open { display: flex; }

    /* empty state */
    .empty-section {
      color: #94a3b8;
      font-size: .9rem;
      padding: 12px 0;
      font-style: italic;
    }

    /* ── Error banner ────────────────────────────────────────── */
    #error-banner {
      display: none;
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #991b1b;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: .9rem;
    }
    #error-banner.show { display: block; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <span class="header-title">Car Maintenance</span>
    <span class="header-sub">2021 Mazda 3</span>
  </div>
</header>

<!-- ── Spinner overlay ─────────────────────────────────────────── -->
<div id="spinner-overlay">
  <div class="spinner"></div>
</div>

<!-- ── Toast ───────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── Main ────────────────────────────────────────────────────── -->
<main>

  <!-- Error banner -->
  <div id="error-banner"></div>

  <!-- Mileage section -->
  <div id="mileage-section">
    <div class="card mileage-card" id="mileage-card">
      <div class="mileage-stats">
        <div class="stat-block">
          <span class="stat-label">Current Mileage</span>
          <span class="stat-value large" id="stat-current-km">—<span class="unit">km</span></span>
        </div>
        <div class="stat-block">
          <span class="stat-label">Last Reading</span>
          <span class="stat-value" id="stat-last-km">—<span class="unit">km</span></span>
          <span class="stat-secondary" id="stat-last-date" style="margin-top:2px;font-size:.82rem;color:#64748b;"></span>
        </div>
        <div class="stat-block">
          <span class="stat-label">Est. Added Since Reading</span>
          <span class="stat-value" id="stat-estimated-km">—<span class="unit">km</span></span>
        </div>
      </div>

      <!-- Update odometer -->
      <div id="odometer-form-wrapper">
        <button class="btn btn-primary btn-sm" id="btn-toggle-odometer">Update Odometer</button>
        <form id="odometer-form" autocomplete="off">
          <div class="form-row">
            <div class="form-group">
              <label for="odo-km">Odometer Reading</label>
              <div class="input-with-unit">
                <input type="number" id="odo-km" name="km" min="0" placeholder="e.g. 45000" required />
                <span class="input-unit">km</span>
              </div>
            </div>
            <div class="form-group">
              <label for="odo-date">Date</label>
              <input type="date" id="odo-date" name="date" required />
            </div>
          </div>
          <div class="form-row">
            <button type="submit" class="btn btn-success btn-sm">Save Reading</button>
            <button type="button" class="btn btn-ghost btn-sm" id="btn-cancel-odometer">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Task list -->
  <div id="tasks-container">
    <!-- Rendered by JS -->
  </div>

</main>

<script>
  /* ─────────────────────────────────────────────────────────────
     Helpers
  ───────────────────────────────────────────────────────────── */
  const TODAY = new Date().toISOString().slice(0, 10);

  function $(id) { return document.getElementById(id); }

  function fmtKm(val) {
    if (val == null) return null;
    return Number(val).toLocaleString();
  }

  function fmtDate(val) {
    if (!val) return null;
    // val may be "YYYY-MM-DD" or ISO string
    const d = val.slice(0, 10);
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  /* ── Toast ──────────────────────────────────────────────────── */
  let toastTimer = null;
  function showToast(msg, type = 'success') {
    const t = $('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 3500);
  }

  /* ── Error banner ───────────────────────────────────────────── */
  function showError(msg) {
    const b = $('error-banner');
    b.textContent = msg;
    b.classList.add('show');
  }
  function clearError() {
    $('error-banner').classList.remove('show');
  }

  /* ── Spinner ────────────────────────────────────────────────── */
  function setLoading(on) {
    $('spinner-overlay').classList.toggle('active', on);
  }

  /* ── API helpers ────────────────────────────────────────────── */
  async function apiFetch(url, options = {}) {
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    if (!res.ok) {
      let detail = `HTTP ${res.status}`;
      try { const j = await res.json(); detail = j.detail || j.message || detail; } catch (_) {}
      throw new Error(detail);
    }
    return res.json();
  }

  /* ─────────────────────────────────────────────────────────────
     Mileage
  ───────────────────────────────────────────────────────────── */
  function renderMileage(data) {
    const currentKm  = data.current_km  ?? data.estimated_km ?? null;
    const lastKm     = data.last_reading_km   ?? null;
    const lastDate   = data.last_reading_date ?? null;
    const estAdded   = data.estimated_km != null && lastKm != null
      ? data.estimated_km - lastKm
      : null;

    // Current km
    const cur = $('stat-current-km');
    cur.innerHTML = currentKm != null
      ? `${fmtKm(currentKm)}<span class="unit"> km</span>`
      : `—`;

    // Last reading
    const lk = $('stat-last-km');
    lk.innerHTML = lastKm != null
      ? `${fmtKm(lastKm)}<span class="unit"> km</span>`
      : `—`;
    $('stat-last-date').textContent = lastDate ? fmtDate(lastDate) : '';

    // Estimated added
    const ea = $('stat-estimated-km');
    ea.innerHTML = estAdded != null && estAdded >= 0
      ? `+${fmtKm(Math.round(estAdded))}<span class="unit"> km</span>`
      : `—`;

    // Pre-fill odometer form
    if (currentKm) $('odo-km').value = Math.round(currentKm);
  }

  /* ─────────────────────────────────────────────────────────────
     Badge helper
  ───────────────────────────────────────────────────────────── */
  function categoryBadge(cat) {
    const c = (cat || 'general').toLowerCase().replace(/[^a-z]/g, '');
    return `<span class="badge badge-${c}">${cat || 'general'}</span>`;
  }

  /* ─────────────────────────────────────────────────────────────
     Status colour helper for meta values
  ───────────────────────────────────────────────────────────── */
  function remainingClass(task) {
    if (task.status === 'overdue' || task.status === 'never_done') return 'highlight-red';
    if (task.status === 'due_soon') return 'highlight-amber';
    return 'highlight-green';
  }

  /* ─────────────────────────────────────────────────────────────
     Render a single task card
  ───────────────────────────────────────────────────────────── */
  function buildTaskCard(task, currentKm) {
    const statusClass = `status-${task.status}`;

    const lastDone = task.last_done_km != null || task.last_done_date != null
      ? `${task.last_done_date ? fmtDate(task.last_done_date) : '?'} — ${task.last_done_km != null ? fmtKm(task.last_done_km) + ' km' : '?'}`
      : 'Never';

    const nextDue = task.next_due_km != null || task.next_due_date != null
      ? `${task.next_due_date ? fmtDate(task.next_due_date) : '?'}${task.next_due_km != null ? ' / ' + fmtKm(task.next_due_km) + ' km' : ''}`
      : '—';

    const hl = remainingClass(task);

    const kmRemaining = task.km_remaining != null
      ? `<div class="meta-item">
           <span class="meta-label">Km Remaining</span>
           <span class="meta-value ${hl}">${fmtKm(task.km_remaining)} km</span>
         </div>`
      : '';

    const daysRemaining = task.days_remaining != null
      ? `<div class="meta-item">
           <span class="meta-label">Days Remaining</span>
           <span class="meta-value ${hl}">${task.days_remaining} days</span>
         </div>`
      : '';

    const notes = task.notes
      ? `<div class="task-notes">${escapeHtml(task.notes)}</div>`
      : '';

    const safeId = escapeHtml(task.id);
    const prefillKm = currentKm ? Math.round(currentKm) : '';

    return `
      <div class="task-card ${statusClass}" id="task-card-${safeId}">
        <div class="task-header">
          <div class="task-title-row">
            <span class="task-name">${escapeHtml(task.name)}</span>
            ${categoryBadge(task.category)}
          </div>
          <button class="btn btn-primary btn-sm" onclick="toggleMarkDone('${safeId}')">Mark as Done</button>
        </div>

        <div class="task-meta">
          <div class="meta-item">
            <span class="meta-label">Interval</span>
            <span class="meta-value">${task.interval_km ? fmtKm(task.interval_km) + ' km' : ''}${task.interval_km && task.interval_months ? ' / ' : ''}${task.interval_months ? task.interval_months + ' mo' : ''}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Last Done</span>
            <span class="meta-value">${lastDone}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Next Due</span>
            <span class="meta-value">${nextDue}</span>
          </div>
          ${kmRemaining}
          ${daysRemaining}
        </div>

        ${notes}

        <!-- Mark as done inline form -->
        <div class="mark-done-form-wrapper">
          <form class="mark-done-form" id="done-form-${safeId}" autocomplete="off"
                onsubmit="submitMarkDone(event, '${safeId}')">
            <div class="form-row">
              <div class="form-group">
                <label for="done-km-${safeId}">Odometer at Completion</label>
                <div class="input-with-unit">
                  <input type="number" id="done-km-${safeId}" name="done_km"
                         min="0" placeholder="e.g. 45000"
                         value="${prefillKm}" required />
                  <span class="input-unit">km</span>
                </div>
              </div>
              <div class="form-group">
                <label for="done-date-${safeId}">Date Completed</label>
                <input type="date" id="done-date-${safeId}" name="done_date"
                       value="${TODAY}" required />
              </div>
              <div class="form-group" style="flex:2 1 200px;">
                <label for="done-notes-${safeId}">Notes (optional)</label>
                <input type="text" id="done-notes-${safeId}" name="notes"
                       placeholder="e.g. Used 0W-20 synthetic, brand X" />
              </div>
            </div>
            <div class="form-row">
              <button type="submit" class="btn btn-success btn-sm">Confirm Done</button>
              <button type="button" class="btn btn-ghost btn-sm"
                      onclick="toggleMarkDone('${safeId}', true)">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    `;
  }

  /* ─────────────────────────────────────────────────────────────
     Escape HTML
  ───────────────────────────────────────────────────────────── */
  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  /* ─────────────────────────────────────────────────────────────
     Render task list
  ───────────────────────────────────────────────────────────── */
  function renderTasks(tasks, currentKm) {
    const overdue  = tasks.filter(t => t.status === 'overdue' || t.status === 'never_done');
    const dueSoon  = tasks.filter(t => t.status === 'due_soon');
    const ok       = tasks.filter(t => t.status === 'ok');

    function section(emoji, label, items) {
      const cards = items.length
        ? items.map(t => buildTaskCard(t, currentKm)).join('')
        : `<p class="empty-section">No tasks in this category.</p>`;
      return `
        <div class="section-header">
          <span>${emoji}</span>
          <h2>${label}</h2>
          <span class="section-count">${items.length}</span>
        </div>
        <div class="task-list">${cards}</div>
      `;
    }

    $('tasks-container').innerHTML =
      section('🔴', 'Overdue', overdue) +
      section('🟡', 'Due Soon', dueSoon) +
      section('🟢', 'Up to Date', ok);
  }

  /* ─────────────────────────────────────────────────────────────
     Toggle mark-done form
  ───────────────────────────────────────────────────────────── */
  function toggleMarkDone(taskId, forceClose = false) {
    const form = document.getElementById(`done-form-${taskId}`);
    if (!form) return;
    if (forceClose) {
      form.classList.remove('open');
    } else {
      form.classList.toggle('open');
    }
  }

  /* ─────────────────────────────────────────────────────────────
     Submit: mark task as done
  ───────────────────────────────────────────────────────────── */
  async function submitMarkDone(event, taskId) {
    event.preventDefault();
    const form = event.target;
    const doneKm    = parseInt(form.done_km.value, 10);
    const doneDate  = form.done_date.value;
    const notes     = form.notes.value.trim();

    if (!doneKm || !doneDate) {
      showToast('Please fill in km and date.', 'error');
      return;
    }

    clearError();
    setLoading(true);
    try {
      await apiFetch(`/api/tasks/${encodeURIComponent(taskId)}/complete`, {
        method: 'POST',
        body: JSON.stringify({ done_km: doneKm, done_date: doneDate, notes }),
      });
      showToast('Task marked as done!', 'success');
      await loadAll();
    } catch (err) {
      showToast(`Error: ${err.message}`, 'error');
      setLoading(false);
    }
  }

  /* ─────────────────────────────────────────────────────────────
     Toggle odometer form
  ───────────────────────────────────────────────────────────── */
  $('btn-toggle-odometer').addEventListener('click', () => {
    $('odometer-form').classList.toggle('open');
  });
  $('btn-cancel-odometer').addEventListener('click', () => {
    $('odometer-form').classList.remove('open');
  });

  /* ─────────────────────────────────────────────────────────────
     Submit: update odometer
  ───────────────────────────────────────────────────────────── */
  $('odometer-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const km   = parseInt($('odo-km').value, 10);
    const date = $('odo-date').value;

    if (!km || !date) {
      showToast('Please fill in km and date.', 'error');
      return;
    }

    clearError();
    setLoading(true);
    try {
      await apiFetch('/api/mileage', {
        method: 'POST',
        body: JSON.stringify({ km, date }),
      });
      $('odometer-form').classList.remove('open');
      showToast('Mileage updated!', 'success');
      await loadAll();
    } catch (err) {
      showToast(`Error: ${err.message}`, 'error');
      setLoading(false);
    }
  });


  /* ─────────────────────────────────────────────────────────────
     Load all data
  ───────────────────────────────────────────────────────────── */
  let _currentKm = null;

  async function loadAll() {
    setLoading(true);
    clearError();
    try {
      const [mileageData, scheduleData] = await Promise.all([
        apiFetch('/api/mileage'),
        apiFetch('/api/schedule'),
      ]);

      _currentKm = mileageData.current_km ?? mileageData.estimated_km ?? null;
      renderMileage(mileageData);
      renderTasks(scheduleData, _currentKm);
    } catch (err) {
      showError(`Failed to load data: ${err.message}. Is the server running?`);
    } finally {
      setLoading(false);
    }
  }

  /* ─────────────────────────────────────────────────────────────
     Init
  ───────────────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', () => {
    // Set today as default date on odometer form
    $('odo-date').value = TODAY;
    loadAll();
  });
</script>
</body>
</html>
